name: Auto Update M3U

on:
  schedule:
    - cron: '0 */3 * * *'   # ⏰ chạy mỗi 3 giờ
  workflow_dispatch:        # cho phép chạy tay

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip (tăng tốc)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: |
          python main.py   # ⚠️ đổi nếu file bạn tên khác

      - name: Commit & Push nếu có thay đổi
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.m3u

          git diff --cached --quiet || git commit -m "auto update m3u (3h)"

          git push
