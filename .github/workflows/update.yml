name: Update M3U PRO MAX

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install libs
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python main.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.m3u

          git diff --cached --quiet || git commit -m "update m3u"

          git push
